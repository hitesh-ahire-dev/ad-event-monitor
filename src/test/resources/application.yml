spring:
  datasource:
    url: jdbc:h2:mem:adevents;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: ad-event-monitor-test
      auto-offset-reset: earliest

app:
  kafka:
    topic: ad-events
  static-enrichment:
    location: classpath:static-enrichment.json
    refresh-ms: 3600000
  dynamic-enrichment:
    location: classpath:dynamic-enrichment.json
    cache-ttl-seconds: 60
    cache-max-size: 1000
